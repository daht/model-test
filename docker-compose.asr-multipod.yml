x-asr-backend: &asr-backend
  image: qwen-asr-api:latest
  command:
    - python
    - -m
    - uvicorn
    - app.asr_api:app
    - --host
    - 0.0.0.0
    - --port
    - "8000"
    - --workers
    - "1"
    - --ws-max-size
    - "${ASR_MAX_FRAME_BYTES:-16000}"
    - --ws-max-queue
    - "${ASR_WS_MAX_QUEUE:-4}"
  env_file:
    - .env
  environment:
    ASR_VLLM_GPU_MEMORY_UTILIZATION: "${ASR_MULTIPOD_GPU_MEMORY_UTILIZATION:-0.35}"
    ASR_MAX_ACTIVE_STREAMS: "${ASR_MULTIPOD_MAX_ACTIVE_STREAMS:-8}"
    ASR_INFERENCE_QUEUE_SIZE: "${ASR_MULTIPOD_INFERENCE_QUEUE_SIZE:-12}"
    ASR_MAX_QUEUED_AUDIO_SECONDS: "${ASR_MULTIPOD_MAX_QUEUED_AUDIO_SECONDS:-6.0}"
    CUDA_VISIBLE_DEVICES: "${ASR_MULTIPOD_CUDA_VISIBLE_DEVICES:-0}"
  volumes:
    - ./models:/models:ro
    - hf-cache:/root/.cache/huggingface
  gpus: all
  restart: unless-stopped
  shm_size: "2gb"
  healthcheck:
    test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()\""]
    interval: 15s
    timeout: 10s
    retries: 3
    start_period: 300s

services:
  qwen-asr-backend-1:
    <<: *asr-backend
    build:
      context: .
      dockerfile: Dockerfile.asr

  qwen-asr-backend-2:
    <<: *asr-backend
    pull_policy: never
    depends_on:
      qwen-asr-backend-1:
        condition: service_healthy

  asr-gateway:
    build:
      context: .
      dockerfile: Dockerfile.asr-gateway
    image: qwen-asr-gateway:latest
    command:
      - python
      - -m
      - uvicorn
      - app.asr_gateway:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
      - --ws-max-size
      - "${ASR_MAX_FRAME_BYTES:-16000}"
      - --ws-max-queue
      - "${ASR_WS_MAX_QUEUE:-4}"
    environment:
      ASR_GATEWAY_BACKENDS: "qwen-asr-backend-1=http://qwen-asr-backend-1:8000,qwen-asr-backend-2=http://qwen-asr-backend-2:8000"
      ASR_GATEWAY_MIN_READY_BACKENDS: "2"
      ASR_GATEWAY_PROBE_INTERVAL_SECONDS: "${ASR_GATEWAY_PROBE_INTERVAL_SECONDS:-1.0}"
      ASR_GATEWAY_PROBE_TIMEOUT_SECONDS: "${ASR_GATEWAY_PROBE_TIMEOUT_SECONDS:-2.0}"
      ASR_GATEWAY_UPSTREAM_OPEN_TIMEOUT_SECONDS: "${ASR_GATEWAY_UPSTREAM_OPEN_TIMEOUT_SECONDS:-5.0}"
      ASR_GATEWAY_UPSTREAM_CLOSE_TIMEOUT_SECONDS: "${ASR_GATEWAY_UPSTREAM_CLOSE_TIMEOUT_SECONDS:-5.0}"
    ports:
      - "8002:8000"
    depends_on:
      - qwen-asr-backend-1
      - qwen-asr-backend-2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hf-cache:
